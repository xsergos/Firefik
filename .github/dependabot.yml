version: 2
updates:
  - package-ecosystem: gomod
    directory: "/backend"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend

  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: daily
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: daily
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    labels:
      - dependencies
      - ci
