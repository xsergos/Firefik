volumes:
  firefik-socket:
  firefik-controlplane-data:
  firefik-controlplane-ca:

x-security: &default-security
  security_opt:
    - no-new-privileges:true
  read_only: false

services:

  backend-build:
    container_name: ${STACK_PREFIX:-firefik}-build
    build: ./backend
    volumes:
      - ./bin:/app/bin
    entrypoint: [ "sh", "-c", "cp /app/firefik /app/bin/firefik" ]
    profiles:
      - build

  dockerproxy:
    container_name: ${STACK_PREFIX:-firefik}-dockerproxy
    image: lscr.io/linuxserver/socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      EVENTS: 1
      NETWORKS: 1
      SERVICES: 0
      TASKS: 0
      IMAGES: 0
      VOLUMES: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /run
    read_only: true
    security_opt:
      - no-new-privileges:true
    profiles:
      - socket-proxy

  backend:
    <<: *default-security
    container_name: ${STACK_PREFIX:-firefik}-back
    build: ./backend
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - firefik-socket:/run/firefik
    environment:
      FIREFIK_LISTEN_ADDR: "unix:///run/firefik/api.sock"
      FIREFIK_SOCKET_MODE: "0660"
      FIREFIK_SOCKET_GROUP: ""
      FIREFIK_CHAIN: FIREFIK
      FIREFIK_DEFAULT_POLICY: RETURN
      FIREFIK_AUTO_ALLOWLIST: "true"
      FIREFIK_LOG_LEVEL: info
      FIREFIK_BACKEND: auto
      FIREFIK_API_TOKEN: "${FIREFIK_API_TOKEN:?FIREFIK_API_TOKEN is required; see README}"
      FIREFIK_METRICS_TOKEN: "${FIREFIK_METRICS_TOKEN:-}"
      FIREFIK_CONTROL_PLANE_GRPC: "${FIREFIK_CONTROL_PLANE_GRPC:-}"
      FIREFIK_CONTROL_PLANE_HTTP: "${FIREFIK_CONTROL_PLANE_HTTP:-}"
      FIREFIK_CONTROL_PLANE_TOKEN: "${FIREFIK_CONTROL_PLANE_TOKEN:-}"
      FIREFIK_CONTROL_PLANE_CA_CERT: "${FIREFIK_CONTROL_PLANE_CA_CERT:-}"
      FIREFIK_CONTROL_PLANE_CLIENT_CERT: "${FIREFIK_CONTROL_PLANE_CLIENT_CERT:-}"
      FIREFIK_CONTROL_PLANE_CLIENT_KEY: "${FIREFIK_CONTROL_PLANE_CLIENT_KEY:-}"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    network_mode: host
    pids_limit: 200
    mem_limit: 256m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "test", "-S", "/run/firefik/api.sock"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    <<: *default-security
    container_name: ${STACK_PREFIX:-firefik}-front
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FIREFIK_HTTP_PORT:-80}:80"
    volumes:
      - firefik-socket:/run/firefik
    environment:
      FIREFIK_API_TOKEN: "${FIREFIK_API_TOKEN:?FIREFIK_API_TOKEN is required; see README}"
    read_only: true
    tmpfs:
      - /tmp:rw,size=16m,mode=1777
      - /data:rw,size=16m,mode=0755
      - /config:rw,size=4m,mode=0755
      - /var/cache/caddy:rw,size=16m,mode=0755
    pids_limit: 100
    mem_limit: 128m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=2", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  controlplane-init:
    <<: *default-security
    container_name: ${STACK_PREFIX:-firefik}-cp-init
    build: ./backend
    entrypoint: ["/usr/local/bin/firefik-server"]
    command:
      - "mini-ca"
      - "init"
      - "--state-dir=/var/lib/firefik-server/ca"
      - "--trust-domain=${FIREFIK_CP_TRUST_DOMAIN:-spiffe://firefik.local/}"
    volumes:
      - firefik-controlplane-ca:/var/lib/firefik-server/ca
    restart: "no"
    profiles:
      - controlplane

  controlplane:
    <<: *default-security
    container_name: ${STACK_PREFIX:-firefik}-cp
    build: ./backend
    restart: unless-stopped
    depends_on:
      controlplane-init:
        condition: service_completed_successfully
    entrypoint: ["/usr/local/bin/firefik-server"]
    command:
      - "--listen=:8443"
      - "--grpc-listen=:8444"
      - "--ca-state-dir=/var/lib/firefik-server/ca"
      - "--db=/var/lib/firefik-server/firefik.db"
      - "--trust-domain=${FIREFIK_CP_TRUST_DOMAIN:-spiffe://firefik.local/}"
      - "--token-file=/run/secrets/firefik_cp_token"
    ports:
      - "${FIREFIK_CP_HTTP_PORT:-8443}:8443"
      - "${FIREFIK_CP_GRPC_PORT:-8444}:8444"
    volumes:
      - firefik-controlplane-data:/var/lib/firefik-server
      - firefik-controlplane-ca:/var/lib/firefik-server/ca
    secrets:
      - firefik_cp_token
    environment:
      FIREFIK_CP_TRUST_DOMAIN: "${FIREFIK_CP_TRUST_DOMAIN:-spiffe://firefik.local/}"
      FIREFIK_WEBHOOK_URL: "${FIREFIK_WEBHOOK_URL:-}"
      FIREFIK_WEBHOOK_EVENTS: "${FIREFIK_WEBHOOK_EVENTS:-}"
      FIREFIK_OTEL_LOGS_ENABLED: "${FIREFIK_OTEL_LOGS_ENABLED:-false}"
    cap_drop:
      - ALL
    pids_limit: 200
    mem_limit: 256m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--timeout=2", "-O", "/dev/null", "http://127.0.0.1:8443/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - controlplane

secrets:
  firefik_cp_token:
    environment: FIREFIK_CP_TOKEN
