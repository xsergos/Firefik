name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release"
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.component.name }} / ${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        runner:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
        component:
          - name: backend
            context: backend
            extra_build_args: ""
          - name: frontend
            context: frontend
            extra_build_args: ""
          - name: panel
            context: frontend
            extra_build_args: |
              VITE_PANEL_MODE=fleet
              CADDY_CONFIG=Caddyfile.panel
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.component.context }}
          platforms: linux/${{ matrix.runner.arch }}
          provenance: true
          sbom: false
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/firefik-${{ matrix.component.name }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ steps.tag.outputs.value }}
            ${{ matrix.component.extra_build_args }}
          cache-from: type=gha,scope=${{ matrix.component.name }}-${{ matrix.runner.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component.name }}-${{ matrix.runner.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.component.name }}-${{ matrix.runner.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Manifest & scan (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: backend
          - name: frontend
          - name: panel
    steps:
      - uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download per-arch digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.component.name }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/firefik-${{ matrix.component.name }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:$TAG" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)
          docker buildx imagetools inspect "$IMAGE:$TAG"

      - name: Trivy scan ${{ matrix.component.name }} (amd64)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/firefik-${{ matrix.component.name }}:${{ steps.tag.outputs.value }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore
          cache: "true"

      - name: Smoke test arm64 image
        if: matrix.component.name == 'backend'
        run: |
          docker pull --platform linux/arm64 ghcr.io/${{ github.repository_owner }}/firefik-${{ matrix.component.name }}:${{ steps.tag.outputs.value }}
          docker run --rm --platform linux/arm64 \
            --entrypoint firefik-admin \
            ghcr.io/${{ github.repository_owner }}/firefik-${{ matrix.component.name }}:${{ steps.tag.outputs.value }} \
            help

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/firefik-${{ matrix.component.name }}:${{ steps.tag.outputs.value }}
          format: cyclonedx-json
          output-file: ${{ matrix.component.name }}-sbom.json
          upload-artifact: true
          artifact-name: ${{ matrix.component.name }}-sbom
          upload-release-assets: false

  release-notes:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs: manifest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v8
        with:
          path: sboms
          pattern: "*-sbom"
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute previous tag
        id: prev
        run: |
          prev=$(git describe --tags --abbrev=0 "${{ steps.tag.outputs.value }}^" 2>/dev/null || echo "")
          echo "value=$prev" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "body<<EOF"
            if [ -n "${{ steps.prev.outputs.value }}" ]; then
              echo "## Changes since ${{ steps.prev.outputs.value }}"
              echo
              git log --pretty=format:'- %s (%h)' "${{ steps.prev.outputs.value }}..${{ steps.tag.outputs.value }}"
            else
              echo "## Initial release ${{ steps.tag.outputs.value }}"
              echo
              git log --pretty=format:'- %s (%h)' -n 50 "${{ steps.tag.outputs.value }}"
            fi
            echo
            echo
            echo "## Images"
            echo
            echo '- `ghcr.io/${{ github.repository_owner }}/firefik-backend:${{ steps.tag.outputs.value }}`'
            echo '- `ghcr.io/${{ github.repository_owner }}/firefik-frontend:${{ steps.tag.outputs.value }}`'
            echo '- `ghcr.io/${{ github.repository_owner }}/firefik-panel:${{ steps.tag.outputs.value }}`'
            echo
            echo "## Spec"
            echo
            echo '- OpenAPI: [backend/internal/api/openapi/swagger.yaml](../blob/${{ steps.tag.outputs.value }}/backend/internal/api/openapi/swagger.yaml)'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            backend/internal/api/openapi/swagger.yaml
            backend/internal/api/openapi/swagger.json
            sboms/*.json
