version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - prealloc
    - revive
    - unparam
    - nilerr
    - bodyclose
    - contextcheck
    - errorlint
  settings:
    gosec:
      excludes:
        - G104
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - prealloc

formatters:
  enable:
    - gofmt
    - goimports
