name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend tests (${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - os: ubuntu-latest
            arch: amd64
            cover_gate: true
          - os: ubuntu-24.04-arm
            arch: arm64
            cover_gate: false
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test + cover-gate (amd64)
        if: matrix.runner.cover_gate
        env:
          COVER_THRESHOLD: "85.0"
        run: make cover-gate

      - name: go test (arm64 — verify cross-arch correctness)
        if: ${{ !matrix.runner.cover_gate }}
        run: go test -count=1 -timeout=10m ./...

  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Cache Go tool binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-swag-1.16.3-govulncheck-latest

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.0
          working-directory: backend
          args: --timeout=5m

      - name: golangci-lint fmt
        working-directory: backend
        run: golangci-lint fmt --diff

      - name: openapi drift check
        run: |
          if ! command -v swag >/dev/null 2>&1; then
            go install github.com/swaggo/swag/cmd/swag@v1.16.3
          fi
          make openapi-check

      - name: govulncheck
        run: |
          if ! command -v govulncheck >/dev/null 2>&1; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
          fi
          govulncheck ./...

      - name: gosec
        uses: securego/gosec@master
        with:
          args: -quiet -exclude-dir=cmd/firefik/testdata ./backend/...

  integration:
    name: Integration (real kernel)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Install iptables-nft and nftables
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: iptables nftables
          version: 1.0

      - name: Kernel modules sanity
        run: |
          sudo iptables -L FORWARD -n
          sudo nft list ruleset

      - name: go test (integration)
        run: sudo -E env "PATH=$PATH" go test -tags=integration -timeout=5m -count=1 ./tests/integration/...

  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: type-check
        run: npm run type-check

      - name: lint
        run: npm run lint

      - name: test (with coverage thresholds)
        run: npm run test:coverage

      - name: build
        run: npm run build

  docker-images:
    name: Docker / ${{ matrix.image.name }} (${{ matrix.runner.arch }})
    runs-on: ${{ matrix.runner.os }}
    needs: [backend-test, frontend]
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        runner:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
        image:
          - name: backend
            context: backend
            tag: firefik-back:ci
            extra_build_args: ""
          - name: frontend
            context: frontend
            tag: firefik-front:ci
            extra_build_args: ""
          - name: panel
            context: frontend
            tag: firefik-panel:ci
            extra_build_args: |
              VITE_PANEL_MODE=fleet
              CADDY_CONFIG=Caddyfile.panel
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image.name }} image (${{ matrix.runner.arch }})
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          push: false
          load: true
          tags: ${{ matrix.image.tag }}-${{ matrix.runner.arch }}
          build-args: ${{ matrix.image.extra_build_args }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.runner.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.runner.arch }}

      - name: Trivy scan ${{ matrix.image.name }} (${{ matrix.runner.arch }})
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image.tag }}-${{ matrix.runner.arch }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
          trivyignores: .trivyignore
          cache: "true"

      - name: Generate SBOM (CycloneDX)
        if: matrix.image.name == 'backend' && matrix.runner.arch == 'amd64'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image.tag }}-${{ matrix.runner.arch }}
          format: cyclonedx-json
          output-file: ${{ matrix.image.name }}-sbom.json
          upload-artifact: true
          artifact-name: ${{ matrix.image.name }}-sbom

  e2e:
    name: E2E (Playwright + docker compose)
    runs-on: ubuntu-24.04
    needs: [backend-test, frontend]
    timeout-minutes: 15
    env:
      FIREFIK_API_TOKEN: e2e-test-token
      FIREFIK_HTTP_PORT: "8080"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Boot compose stack with E2E overrides
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d --wait \
            || (docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --no-color; exit 1)

      - name: Wait for frontend readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "frontend never became ready"
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --no-color
          exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
          CI: "true"
        run: npx playwright test

      - name: Collect compose logs
        if: always()
        run: |
          mkdir -p e2e-artifacts
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --no-color > e2e-artifacts/compose.log || true
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml ps > e2e-artifacts/ps.txt || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-compose-logs
          path: e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v || true

  podman:
    name: Podman smoke (rootful)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install podman + podman-compose
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: podman podman-compose
          version: 1.0

      - name: Enable rootful podman socket
        run: |
          sudo systemctl enable --now podman.socket
          sudo ls -l /run/podman/podman.sock

      - name: Build images with podman
        run: |
          sudo podman build -t firefik-back:ci backend
          sudo podman build -t firefik-front:ci frontend

      - name: Smoke run (list containers via firefik API)
        env:
          FIREFIK_API_TOKEN: podman-smoke-token
        run: |
          set -x
          sudo podman run -d --rm --name firefik-back \
            --network host \
            -v /run/podman/podman.sock:/var/run/docker.sock \
            -e FIREFIK_API_TOKEN="$FIREFIK_API_TOKEN" \
            -e FIREFIK_LISTEN_ADDR=":8081" \
            -e FIREFIK_BACKEND=iptables \
            --cap-add NET_ADMIN --cap-add NET_RAW \
            --privileged \
            firefik-back:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/health >/dev/null; then
              echo "firefik-back via podman: ok"
              ok=1
              break
            fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then
            echo "::error::firefik-back never became healthy via podman"
            sudo podman logs firefik-back || true
            sudo podman stop firefik-back || true
            exit 1
          fi
          curl -sfH "Authorization: Bearer $FIREFIK_API_TOKEN" \
            http://localhost:8081/api/containers >/dev/null
          sudo podman logs firefik-back | tail -50
          sudo podman stop firefik-back || true
